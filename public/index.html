<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Osaid Mart — Browse fresh groceries, add to cart, and place orders online.">
  <title>Osaid Mart — Fresh Groceries Online</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────── -->
  <header class="header" id="header">
    <a class="logo" href="/"><span>🛒</span> Osaid Mart</a>
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
      <input type="text" id="search-input" placeholder="Search for groceries..." aria-label="Search products">
    </div>
    <div class="header-actions">
      <!-- Logged out state -->
      <div id="auth-buttons">
        <button class="auth-btn" id="login-btn">Login</button>
        <button class="auth-btn auth-btn-primary" id="register-btn">Sign Up</button>
      </div>
      <!-- Logged in state -->
      <div id="user-menu" class="user-menu hidden">
        <div class="user-avatar" id="user-avatar">O</div>
        <span class="user-name" id="user-name">User</span>
        <button class="logout-btn" id="logout-btn" title="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
        </button>
      </div>
      <button class="cart-btn" id="open-cart" aria-label="Open cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
        <span>Cart</span>
        <div class="badge" id="cart-badge">0</div>
      </button>
    </div>
  </header>

  <!-- ── Hero ────────────────────────────────────────── -->
  <section class="hero">
    <h1>Osaid Mart — Fresh Groceries, Delivered to You</h1>
    <p>Browse our curated selection of farm-fresh produce, artisan bakery, premium dairy, and everyday pantry staples.</p>
  </section>

  <!-- ── Category Filters ────────────────────────────── -->
  <nav class="categories" id="categories" aria-label="Product categories"></nav>

  <!-- ── Products ────────────────────────────────────── -->
  <main class="products-section">
    <div class="products-header">
      <h2>Our Products</h2>
      <span class="product-count" id="product-count"></span>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </main>

  <!-- ── Cart Sidebar ────────────────────────────────── -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2>🛒 Your Cart</h2>
      <button class="close-cart" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span id="cart-total-amount">₹0</span></div>
      <button class="checkout-btn" disabled>Proceed to Checkout</button>
    </div>
  </aside>

  <!-- ── Auth Modal ──────────────────────────────────── -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="auth-modal-title">Login</h2>
        <button class="close-cart" onclick="closeAuthModal()" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="auth-modal-body">
        <div class="form-group"><label for="auth-email">Email Address</label><input type="email" id="auth-email" placeholder="you@example.com"></div>
        <div class="form-group"><label for="auth-password">Password</label><input type="password" id="auth-password" placeholder="••••••••"></div>
        <div class="auth-error hidden" id="auth-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeAuthModal()">Cancel</button>
        <button class="btn-confirm" id="auth-submit">Login</button>
      </div>
      <div class="auth-switch" id="auth-switch">
        Don't have an account? <a href="#" id="auth-switch-link">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- ── Checkout Modal ──────────────────────────────── -->
  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Checkout</h2>
        <button class="close-cart" onclick="closeCheckoutModal()" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="checkout-body">
        <div class="checkout-summary" id="checkout-summary"></div>
        <div class="form-group">
          <label for="input-address">Delivery Address</label>
          <textarea id="input-address" placeholder="123 Main St, Apt 4..."></textarea>
        </div>
      </div>
      <div class="modal-footer" id="checkout-footer">
        <button class="btn-cancel" onclick="closeCheckoutModal()">Cancel</button>
        <button class="btn-confirm" id="place-order-btn">Place Order</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ───────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
